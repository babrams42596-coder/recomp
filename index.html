<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RecompOS">
<title>RecompOS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --bg: #0f0f11;
  --bg2: #161619;
  --bg3: #1e1e23;
  --bg4: #26262d;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e8ec;
  --text2: #9898a8;
  --text3: #5a5a6e;
  --accent: #7c6af7;
  --accent2: #5b4fd4;
  --green: #4ade80;
  --amber: #fbbf24;
  --red: #f87171;
  --teal: #2dd4bf;
  --pc: #60a5fa;
  --cc: #fbbf24;
  --fc: #4ade80;
  --kcal: #f472b6;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }
::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

/* ── APP SHELL ── */
#app { height: 100%; display: flex; flex-direction: column; }

/* ── HEADER ── */
.header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 16px;
  padding-top: var(--safe-top);
  height: calc(54px + var(--safe-top));
  display: flex; align-items: flex-end; flex-shrink: 0; position: relative; z-index: 50;
}
.header-inner { display: flex; align-items: center; justify-content: space-between; width: 100%; height: 54px; }
.logo { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: -0.02em; }
.logo span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 8px; }
.week-pill { font-family: 'DM Mono', monospace; font-size: 11px; background: var(--bg4); border: 1px solid var(--border2); border-radius: 20px; padding: 4px 10px; color: var(--text2); }
.icon-btn { width: 40px; height: 40px; border-radius: 11px; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); font-size: 19px; flex-shrink: 0; transition: background .12s; }
.icon-btn:active { background: var(--bg4); }

/* ── BODY ── */
.app-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 14px 14px calc(72px + var(--safe-bottom)); }

/* ── CALENDAR DRAWER ── */
.drawer-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); }
.drawer-overlay.open { display: block; }
.drawer { position: fixed; left: 0; top: 0; bottom: 0; z-index: 201; width: min(310px, 92vw); background: var(--bg2); border-right: 1px solid var(--border); padding: max(20px,var(--safe-top)) 16px max(20px,var(--safe-bottom)); overflow-y: auto; transform: translateX(-100%); transition: transform .28s cubic-bezier(.4,0,.2,1); }
.drawer.open { transform: translateX(0); }
.drawer-close { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.drawer-title { font-family: 'Syne', sans-serif; font-size: 19px; font-weight: 700; }
.drawer-x { width: 38px; height: 38px; border-radius: 10px; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); font-size: 22px; }

/* ── MINI CAL ── */
.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.month-label { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; }
.week-grid { display: flex; flex-direction: column; gap: 3px; }
.week-row { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.week-day-header { text-align: center; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); padding: 4px 0; }
.day-cell { aspect-ratio:1; border-radius:7px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; font-family:'DM Mono',monospace; font-size:11px; color:var(--text3); background:var(--bg3); border:1px solid transparent; position:relative; transition: all .1s; }
.day-cell:active { opacity: 0.7; }
.day-cell.today { border-color:var(--accent); color:var(--accent); background:rgba(124,106,247,0.1); }
.day-cell.selected { background:var(--accent); color:#fff; border-color:var(--accent); }
.day-cell.workout-marker::after { content:''; width:3px; height:3px; border-radius:50%; position:absolute; top:3px; background:var(--accent); }
.day-cell .dot { width:3px; height:3px; border-radius:50%; position:absolute; bottom:3px; background:var(--green); display:none; }
.day-cell.logged .dot { display:block; }

/* ── STREAK & RINGS ── */
.streak-card { background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:14px; display:flex; align-items:center; gap:14px; margin-bottom:16px; }
.streak-num { font-family:'Syne',sans-serif; font-size:36px; font-weight:700; color:var(--amber); line-height:1; }
.streak-text { font-size:13px; color:var(--text2); }
.streak-sub { font-size:12px; color:var(--text3); margin-top:2px; }
.ring-row { display:flex; gap:8px; }
.ring-card { flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:11px; padding:12px 8px; text-align:center; }
.ring-card svg { width:48px; height:48px; }
.ring-label { font-size:11px; color:var(--text3); margin-top:4px; font-family:'DM Mono',monospace; }
.ring-val { font-size:12px; font-weight:500; color:var(--text); }
.sidebar-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.1em; color:var(--text3); text-transform:uppercase; margin-bottom:10px; }

/* ── WEEK STRIP ── */
.week-strip { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:14px; }
.ws-cell { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:8px 3px; text-align:center; cursor:pointer; transition:all .12s; }
.ws-cell:active { background:var(--bg3); }
.ws-cell.selected { border-color:var(--accent); background:rgba(124,106,247,0.08); }
.ws-cell.today { border-color:rgba(124,106,247,0.5); }
.ws-day { font-family:'DM Mono',monospace; font-size:9px; color:var(--text3); margin-bottom:2px; }
.ws-num { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; }
.ws-type { font-size:9px; color:var(--text3); margin-top:2px; }
.ws-cell.workout-day .ws-type { color:var(--accent); }
.ws-cell.rest-day .ws-type { color:var(--teal); }
.ws-dot { width:4px; height:4px; border-radius:50%; background:var(--green); margin:3px auto 0; opacity:0; }
.ws-cell.has-log .ws-dot { opacity:1; }

/* ── DAY HEADER ── */
.day-header { margin-bottom:14px; }
.day-overline { font-family:'DM Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--text3); margin-bottom:4px; }
.day-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; letter-spacing:-0.02em; line-height:1.1; }
.day-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 13px; border-radius:20px; font-family:'DM Mono',monospace; font-size:11px; font-weight:500; margin-top:8px; }
.badge-workout { background:rgba(124,106,247,0.15); color:var(--accent); border:1px solid rgba(124,106,247,0.3); }
.badge-rest { background:rgba(45,212,191,0.1); color:var(--teal); border:1px solid rgba(45,212,191,0.2); }
.phase-tip { background:var(--bg3); border-left:2px solid var(--accent); border-radius:0 8px 8px 0; padding:10px 12px; font-size:13px; color:var(--text2); margin-top:10px; line-height:1.6; }

/* ── MACRO CHIPS ── */
.macro-chips { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin-bottom:12px; }
.mc { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:10px 6px; text-align:center; }
.mc-val { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; }
.mc-lbl { font-size:10px; color:var(--text3); margin-top:2px; font-family:'DM Mono',monospace; }
.mc.cal .mc-val { color:var(--kcal); } .mc.pro .mc-val { color:var(--pc); } .mc.carb .mc-val { color:var(--cc); } .mc.fat .mc-val { color:var(--fc); }
.mp-row { display:grid; grid-template-columns:58px 1fr 66px; gap:8px; align-items:center; margin-bottom:8px; }
.mp-lbl { font-size:12px; color:var(--text2); font-family:'DM Mono',monospace; }
.mp-bar-wrap { background:var(--bg4); border-radius:4px; height:5px; }
.mp-bar { height:5px; border-radius:4px; transition:width .4s; }
.mp-nums { font-family:'DM Mono',monospace; font-size:10px; color:var(--text3); text-align:right; }
.mp-nums span { color:var(--text); }

/* ── CARDS ── */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:16px; overflow:hidden; margin-bottom:12px; }
.card-hd { padding:14px 16px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.card-hd-left { display:flex; align-items:center; gap:8px; }
.card-ico { font-size:17px; }
.card-ttl { font-family:'Syne',sans-serif; font-size:15px; font-weight:600; }
.card-bd { padding:14px 16px; }

/* ── TABS ── */
.tab-bar { display:flex; background:var(--bg3); border-radius:13px; padding:3px; margin-bottom:14px; gap:2px; }
.tab-btn { flex:1; padding:10px 6px; border-radius:10px; border:none; background:transparent; color:var(--text3); font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; transition:all .15s; white-space:nowrap; }
.tab-btn.active { background:var(--bg2); color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,0.35); }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* ── MEALS ── */
.meal-item { background:var(--bg3); border:1px solid var(--border); border-radius:13px; padding:14px; margin-bottom:10px; transition:border-color .15s; }
.meal-item.logged { border-color:rgba(74,222,128,0.35); background:rgba(74,222,128,0.04); }
.meal-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.meal-name { font-weight:500; font-size:15px; }
.meal-time { font-family:'DM Mono',monospace; font-size:11px; color:var(--text3); }
.meal-pills { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px; }
.mpill { font-family:'DM Mono',monospace; font-size:10px; padding:3px 8px; border-radius:5px; border:1px solid; }
.mpill.p { border-color:rgba(96,165,250,0.3); color:var(--pc); background:rgba(96,165,250,0.08); }
.mpill.c { border-color:rgba(251,191,36,0.3); color:var(--cc); background:rgba(251,191,36,0.08); }
.mpill.f { border-color:rgba(74,222,128,0.3); color:var(--fc); background:rgba(74,222,128,0.08); }
.mpill.k { border-color:rgba(244,114,182,0.3); color:var(--kcal); background:rgba(244,114,182,0.08); }
.food-list { list-style:none; margin-bottom:12px; }
.food-list li { font-size:13px; color:var(--text3); padding:4px 0 4px 14px; position:relative; line-height:1.5; }
.food-list li::before { content:'—'; position:absolute; left:0; color:var(--text3); }
.log-btn { width:100%; padding:13px; border-radius:11px; border:1px solid var(--border2); background:transparent; color:var(--text2); font-family:'DM Mono',monospace; font-size:13px; cursor:pointer; transition:all .15s; }
.log-btn:active { background:var(--bg4); }
.meal-item.logged .log-btn { background:rgba(74,222,128,0.1); border-color:rgba(74,222,128,0.3); color:var(--green); }

/* ── EXERCISES ── */
.ex-item { background:var(--bg3); border:1px solid var(--border); border-radius:13px; padding:14px; margin-bottom:10px; transition:border-color .15s; }
.ex-item.logged { border-color:rgba(124,106,247,0.4); background:rgba(124,106,247,0.05); }
.ex-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
.ex-name { font-weight:500; font-size:15px; flex:1; padding-right:8px; }
.ex-tag { font-family:'DM Mono',monospace; font-size:10px; padding:3px 8px; border-radius:5px; background:rgba(124,106,247,0.15); color:var(--accent); border:1px solid rgba(124,106,247,0.3); white-space:nowrap; flex-shrink:0; }
.ex-sets { font-family:'DM Mono',monospace; font-size:12px; color:var(--text2); margin-bottom:4px; }
.ex-note { font-size:13px; color:var(--text3); margin-bottom:12px; line-height:1.5; }
.ex-inputs { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.ex-input { padding:13px 12px; background:var(--bg4); border:1px solid var(--border); border-radius:11px; color:var(--text); font-family:'DM Mono',monospace; font-size:14px; outline:none; width:100%; transition:border-color .15s; -webkit-appearance:none; }
.ex-input:focus { border-color:var(--accent); }
.ex-input::placeholder { color:var(--text3); }
.ex-log-btn { width:100%; padding:13px; border-radius:11px; border:1px solid var(--accent); background:rgba(124,106,247,0.15); color:var(--accent); font-family:'DM Mono',monospace; font-size:13px; cursor:pointer; transition:all .15s; }
.ex-log-btn:active { background:var(--accent); color:#fff; }
.ex-item.logged .ex-log-btn { background:var(--accent); color:#fff; }
.warmup-bar { font-size:13px; color:var(--text3); background:var(--bg3); border-left:2px solid var(--accent); border-radius:0 8px 8px 0; padding:10px 12px; margin-bottom:14px; line-height:1.6; }
.cardio-bar { background:var(--bg3); border:1px solid rgba(45,212,191,0.2); border-radius:11px; padding:14px; margin-top:10px; }
.cardio-ttl { font-size:14px; font-weight:500; color:var(--teal); margin-bottom:4px; }
.cardio-desc { font-size:13px; color:var(--text2); line-height:1.6; }

/* ── REST DAY ── */
.rest-card { background:var(--bg3); border:1px solid rgba(45,212,191,0.15); border-radius:14px; padding:20px; margin-bottom:12px; }
.rest-ttl { font-family:'Syne',sans-serif; font-size:18px; font-weight:600; color:var(--teal); margin-bottom:8px; }
.rest-body { font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:14px; }
.rest-tip { background:var(--bg4); border-left:2px solid var(--teal); border-radius:0 8px 8px 0; padding:10px 12px; font-size:13px; color:var(--text2); line-height:1.6; }

/* ── NOTES ── */
.notes-area { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:13px; padding:14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px; resize:none; min-height:100px; outline:none; transition:border-color .15s; -webkit-appearance:none; }
.notes-area:focus { border-color:var(--border2); }
.save-btn { margin-top:10px; padding:13px 20px; border-radius:11px; border:1px solid var(--border2); background:var(--bg4); color:var(--text2); font-family:'DM Mono',monospace; font-size:13px; cursor:pointer; }
.save-btn:active { background:var(--bg3); color:var(--text); }
.saved-flash { color:var(--green); font-family:'DM Mono',monospace; font-size:11px; margin-left:10px; opacity:0; transition:opacity .3s; }

/* ── COMPLETE BTN ── */
.complete-btn { width:100%; padding:16px; border-radius:14px; margin-top:12px; border:1px solid rgba(74,222,128,0.3); background:rgba(74,222,128,0.08); color:var(--green); font-family:'Syne',sans-serif; font-size:16px; font-weight:600; cursor:pointer; transition:all .15s; }
.complete-btn:active { background:rgba(74,222,128,0.2); }
.complete-btn.done { background:var(--green); color:#0f0f11; border-color:var(--green); }

/* ── BOTTOM NAV ── */
.bottom-nav { flex-shrink:0; background:var(--bg2); border-top:1px solid var(--border); padding-bottom:var(--safe-bottom); display:flex; }
.bnb { flex:1; padding:10px 4px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; border:none; background:transparent; color:var(--text3); transition:color .15s; }
.bnb.active { color:var(--accent); }
.bnb-ico { font-size:22px; line-height:1; }
.bnb-lbl { font-family:'DM Mono',monospace; font-size:10px; }

.sep { border:none; border-top:1px solid var(--border); margin:14px 0; }
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="icon-btn" onclick="openDrawer()">📅</div>
        <div class="logo">RECOMP<span>OS</span></div>
        <div class="week-pill" id="week-pill">Wk 1</div>
      </div>
      <div class="header-right">
        <div class="icon-btn" onclick="navigateDay(-1)" style="font-size:22px;color:var(--text)">‹</div>
        <div class="icon-btn" onclick="navigateDay(1)" style="font-size:22px;color:var(--text)">›</div>
      </div>
    </div>
  </div>

  <!-- CALENDAR DRAWER -->
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="cal-drawer">
    <div class="drawer-close">
      <div class="drawer-title">Calendar</div>
      <div class="drawer-x" onclick="closeDrawer()">×</div>
    </div>
    <div style="margin-bottom:20px">
      <div class="month-nav">
        <div class="month-label" id="cal-month-label">March 2026</div>
        <div style="display:flex;gap:6px">
          <div class="icon-btn" style="width:34px;height:34px;font-size:15px" onclick="changeMonth(-1)">‹</div>
          <div class="icon-btn" style="width:34px;height:34px;font-size:15px" onclick="changeMonth(1)">›</div>
        </div>
      </div>
      <div class="week-row" style="margin-bottom:4px">
        <div class="week-day-header">S</div><div class="week-day-header">M</div><div class="week-day-header">T</div>
        <div class="week-day-header">W</div><div class="week-day-header">T</div><div class="week-day-header">F</div><div class="week-day-header">S</div>
      </div>
      <div id="cal-grid" class="week-grid"></div>
    </div>
    <hr class="sep">
    <div class="sidebar-label">Streak</div>
    <div class="streak-card">
      <div class="streak-num" id="streak-num">0</div>
      <div><div class="streak-text">day streak</div><div class="streak-sub" id="streak-sub">Start logging to begin</div></div>
    </div>
    <div class="sidebar-label">6-Month Progress</div>
    <div id="progress-rings" class="ring-row"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="app-body">
    <div class="content" id="main-content"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="bnb active" id="bnb-today" onclick="goToday()"><div class="bnb-ico">🏠</div><div class="bnb-lbl">Today</div></button>
    <button class="bnb" id="bnb-prev" onclick="navigateDay(-1)"><div class="bnb-ico">‹</div><div class="bnb-lbl">Prev</div></button>
    <button class="bnb" id="bnb-next" onclick="navigateDay(1)"><div class="bnb-ico">›</div><div class="bnb-lbl">Next</div></button>
    <button class="bnb" onclick="openDrawer()"><div class="bnb-ico">📊</div><div class="bnb-lbl">Stats</div></button>
  </div>
</div>

<script>
// ══ PLAN DATA ══════════════════════════════════════════════
const START_DATE = new Date(2026,2,16);
const PLAN_DAYS = 183;
const WORKOUT_DAYS = [2,4,6];
const WR = ['strength','hypertrophy','power'];

const WORKOUTS = {
  strength: { name:'Day 1 — Strength Focus', dur:'~45 min', warmup:'5 min: leg swings, arm circles, hip hinges, 20 light KB swings',
    exercises:[
      {name:'KB Goblet Squat',sets:'4 × 10–12',rest:'75s',note:'KB at chest, knees track toes, chest tall',tag:'Lower'},
      {name:'DB Romanian Deadlift',sets:'4 × 10–12',rest:'75s',note:'Hip hinge, soft knee, neutral spine',tag:'Posterior'},
      {name:'DB Bench Press',sets:'3 × 10–12',rest:'60s',note:'Controlled descent, full ROM — floor or bench',tag:'Push'},
      {name:'DB Bent-Over Row',sets:'3 × 10–12',rest:'60s',note:'Drive elbow back, squeeze lats at top',tag:'Pull'},
      {name:'KB Overhead Press',sets:'3 × 8–10 / arm',rest:'60s',note:'Standing single-arm, brace core, no lumbar arch',tag:'Push'},
      {name:'KB Swings (Finisher)',sets:'3 × 20',rest:'45s',note:'Explosive hip drive — not a squat',tag:'Cardio'},
    ], cardio:'15 min optional steady-state walk or bike after lifting'},
  hypertrophy: { name:'Day 2 — Hypertrophy + HIIT', dur:'~50 min', warmup:'5 min: jump rope or marching + dynamic stretches',
    exercises:[
      {name:'DB Split Squat (RFE)',sets:'3 × 10 / leg',rest:'60s',note:'Rear foot elevated, knee tracks over 2nd toe',tag:'Lower'},
      {name:'KB Sumo Deadlift',sets:'4 × 10–12',rest:'75s',note:'Wide stance, drive floor away, squeeze glutes at top',tag:'Posterior'},
      {name:'DB Incline Press',sets:'3 × 10–12',rest:'60s',note:'30–45° incline, upper chest emphasis',tag:'Push'},
      {name:'KB Renegade Row',sets:'3 × 8 / arm',rest:'60s',note:'Plank position, anti-rotation core work built in',tag:'Pull'},
      {name:'DB Lateral Raises + Curls',sets:'3 × 12 (superset)',rest:'45s',note:'Light weight, slow tempo — shoulders + biceps',tag:'Arms'},
      {name:'HIIT Finisher',sets:'4 rounds · 30s on/20s off',rest:'30s between rounds',note:'20 KB swings + 5 burpees per round — keep intensity HIGH',tag:'HIIT'},
    ], cardio:null},
  power: { name:'Day 3 — Power + Conditioning', dur:'~55–60 min', warmup:'5 min: KB halos, hip circles, thoracic rotations',
    exercises:[
      {name:'KB Clean & Press',sets:'4 × 6–8 / arm',rest:'90s',note:'Explosive clean from hang, press from rack position',tag:'Full Body'},
      {name:'DB Goblet Squat — Pause',sets:'4 × 8 (2s pause)',rest:'75s',note:'2-second pause at bottom, builds time under tension',tag:'Lower'},
      {name:'DB Push-Up Row',sets:'3 × 8',rest:'60s',note:'Push-up then row each arm — high motor recruitment',tag:'Full Body'},
      {name:'KB Suitcase Carry',sets:'3 × 30m / arm',rest:'60s',note:'Anti-lateral flexion, oblique and core stability',tag:'Core'},
      {name:'DB RDL + Row Combo',sets:'3 × 10',rest:'60s',note:'Hinge down → row at bottom → stand up',tag:'Full Body'},
    ], cardio:'20–30 min Zone 2 steady-state (walk or bike). Conversational pace.'},
};

const MT = [
  {name:'Breakfast',time:'6:30 AM',macros:{p:55,c:60,f:15,cal:595},foods:['5 large eggs scrambled (or 2 whole + 4 whites)','1 cup cooked oatmeal (80g dry) + cinnamon','½ cup low-fat cottage cheese on the side','Black coffee or green tea']},
  {name:'Lunch',time:'12:30 PM',macros:{p:55,c:55,f:15,cal:575},foods:['6 oz lean ground turkey or grilled chicken','1 cup cooked brown rice or sweet potato (200g)','2 cups leafy greens + cucumber + tomatoes','Olive oil + lemon dressing (1 tsp)']},
  {name:'Pre-Workout Snack',time:'3:30 PM',macros:{p:30,c:40,f:5,cal:325},foods:['1 scoop whey protein in water','1 medium banana','1 rice cake + thin smear almond butter','Eat 60–90 min before training']},
  {name:'Post-Workout Dinner',time:'7:00 PM',macros:{p:55,c:35,f:20,cal:540},foods:['7 oz salmon or 8 oz white fish (cod/tilapia)','1.5 cups roasted vegetables (broccoli, zucchini, peppers)','½ cup quinoa or small sweet potato','Olive oil, garlic, herbs']},
  {name:'Evening Snack',time:'9:30 PM',macros:{p:30,c:10,f:10,cal:250},foods:['1 cup 2% or full-fat Greek yogurt (plain)','1 tbsp almond butter or small handful walnuts','Casein-rich — slow digestion overnight']},
];
const MR = [
  {name:'Breakfast',time:'7:00 AM',macros:{p:50,c:35,f:15,cal:475},foods:['4 egg whites + 1 whole egg scrambled','½ cup oatmeal (40g dry) + berries','½ cup cottage cheese on the side','Black coffee or green tea']},
  {name:'Lunch',time:'12:30 PM',macros:{p:55,c:35,f:15,cal:495},foods:['6 oz grilled chicken or canned tuna in water','1 cup mixed greens + veg + 2 tbsp hummus','½ cup lentils or chickpeas','ACV + olive oil dressing (1 tsp)']},
  {name:'Afternoon Snack',time:'3:30 PM',macros:{p:30,c:20,f:8,cal:272},foods:['1 scoop whey protein in water','1 medium apple or pear','12 almonds or small handful walnuts']},
  {name:'Dinner',time:'6:30 PM',macros:{p:55,c:30,f:17,cal:489},foods:['7 oz lean beef (95%) or 8 oz shrimp','2 cups roasted non-starchy veg (broccoli, asparagus)','½ cup black beans or small sweet potato','Season with olive oil, spices, lemon']},
  {name:'Evening Snack',time:'9:00 PM',macros:{p:25,c:10,f:10,cal:230},foods:['1 cup plain Greek yogurt','1 tbsp nut butter or 10 walnut halves','Cinnamon or vanilla if desired']},
];
const PHASES=[
  {name:'Phase 1 — Foundation',tip:'Focus on form and consistency. Don\'t chase heavy weights yet. Learn the patterns and nail nutrition daily.'},
  {name:'Phase 2 — Build',tip:'Add weight wherever you\'ve hit the top of the rep range. Log every session. Progress is the goal.'},
  {name:'Phase 3 — Push',tip:'Increase intensity. Add sets where recovery allows. Consider an optional 4th light cardio session.'},
  {name:'Phase 4 — Refine',tip:'Dial nutrition. Tighten carb timing. Take progress photos and compare to Week 1.'},
  {name:'Phase 5 — Peak',tip:'Advanced territory. Up weights aggressively. Consider a deload at week 20. Sleep is your #1 tool.'},
  {name:'Phase 6 — Finish Strong',tip:'Final push. Review all progress and set new 6-month targets.'},
];
const REST_TIPS=['Walk 20–30 min at an easy pace. Active recovery beats total rest for endomorphs.','Focus on 8 hours of sleep tonight. Recovery is where muscle is built.','Foam roll your quads, hamstrings, and thoracic spine for 10 minutes.','Drink an extra glass of water. Hydration drives fat metabolism.','Today\'s job: hit your macros perfectly. Protein especially.','10 min mobility work — hip flexors, shoulders, and ankles.','Keep stress low today — cortisol fights recomp directly.','Easy 20 min bike or walk burns extra calories at low intensity.'];

// ══ STATE ══════════════════════════════════════════════════
let state = {}, currentDate = new Date(), calMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1), activeTab = 'workout';

function loadState() { try { const s=localStorage.getItem('recompos_v5'); if(s) state=JSON.parse(s); } catch(e){} }
function saveState() { try { localStorage.setItem('recompos_v5', JSON.stringify(state)); } catch(e){} }

const gk = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const gds = d => { const k=gk(d); if(!state[k]) state[k]={meals:{},exercises:{},notes:'',completed:false}; return state[k]; };
const dbet = (a,b) => Math.floor((b-a)/86400000);
const inPlan = d => { const n=dbet(START_DATE,d); return n>=0&&n<PLAN_DAYS; };
const isWD = d => WORKOUT_DAYS.includes(d.getDay());
const getWIdx = d => { let c=0; const x=new Date(START_DATE); while(x<d){if(isWD(x))c++;x.setDate(x.getDate()+1);} return c%3; };
const getW = d => WORKOUTS[WR[getWIdx(d)]];
const getPhase = d => { const w=Math.floor(dbet(START_DATE,d)/7); if(w<4)return PHASES[0];if(w<8)return PHASES[1];if(w<12)return PHASES[2];if(w<16)return PHASES[3];if(w<22)return PHASES[4];return PHASES[5]; };
const getWkNum = d => Math.floor(dbet(START_DATE,d)/7)+1;
const fmtDate = d => { const dn=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],mn=['January','February','March','April','May','June','July','August','September','October','November','December']; return `${dn[d.getDay()]}, ${mn[d.getMonth()]} ${d.getDate()}`; };
const calcLogged = d => { const ds=gds(d),meals=isWD(d)?MT:MR; let p=0,c=0,f=0,cal=0; meals.forEach((m,i)=>{if(ds.meals[i]){p+=m.macros.p;c+=m.macros.c;f+=m.macros.f;cal+=m.macros.cal;}}); return {p,c,f,cal}; };
const calcTarget = d => isWD(d)?{p:220,c:220,f:65,cal:2400}:{p:220,c:130,f:65,cal:2100};
const calcStreak = () => { let s=0; const d=new Date(currentDate); d.setDate(d.getDate()-1); while(inPlan(d)){if(state[gk(d)]?.completed){s++;d.setDate(d.getDate()-1);}else break;} return s; };
const totalLogged = () => Object.values(state).filter(d=>d.completed).length;

// ══ RENDER ═════════════════════════════════════════════════
function renderAll() { renderHeader(); renderCal(); renderStreak(); renderRings(); renderContent(); }

function renderHeader() {
  const wn=Math.max(1,Math.min(getWkNum(currentDate),26));
  document.getElementById('week-pill').textContent=`Wk ${wn}`;
}

function renderCal() {
  const el=document.getElementById('cal-grid'); if(!el) return;
  const yr=calMonth.getFullYear(),mo=calMonth.getMonth();
  document.getElementById('cal-month-label').textContent=new Date(yr,mo,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const first=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate(),today=new Date();
  let cells=[]; for(let i=0;i<first;i++) cells.push(null); for(let d=1;d<=dim;d++) cells.push(new Date(yr,mo,d));
  while(cells.length%7!==0) cells.push(null);
  let html='';
  cells.forEach((d,i)=>{
    if(i%7===0) html+='<div class="week-row">';
    if(!d){html+='<div class="day-cell" style="opacity:0;pointer-events:none"></div>';}
    else{
      const k=gk(d),isT=d.toDateString()===today.toDateString(),isSel=d.toDateString()===currentDate.toDateString();
      const wo=inPlan(d)&&isWD(d),logged=state[k]?.completed;
      let cls='day-cell'; if(isT)cls+=' today'; if(isSel)cls+=' selected'; if(wo)cls+=' workout-marker'; if(logged)cls+=' logged';
      html+=`<div class="${cls}" onclick="selDay(${d.getFullYear()},${d.getMonth()},${d.getDate()})">${d.getDate()}<div class="dot"></div></div>`;
    }
    if((i+1)%7===0) html+='</div>';
  });
  el.innerHTML=html;
}

function renderStreak() {
  const s=calcStreak();
  document.getElementById('streak-num').textContent=s;
  document.getElementById('streak-sub').textContent=s===0?'Start logging to begin':s===1?'1 day completed':`${s} days in a row`;
}

function renderRings() {
  const el=document.getElementById('progress-rings'); if(!el) return;
  const done=totalLogged(),total=PLAN_DAYS;
  const wkTot=Array.from({length:PLAN_DAYS},(_,i)=>{const d=new Date(START_DATE);d.setDate(d.getDate()+i);return d;}).filter(isWD).length;
  const wkDone=Object.entries(state).filter(([k,v])=>{const[yr,mo,da]=k.split('-').map(Number);return isWD(new Date(yr,mo-1,da))&&v.completed;}).length;
  el.innerHTML=[{label:'Days',val:done,max:total,color:'#7c6af7'},{label:'Workouts',val:wkDone,max:wkTot,color:'#4ade80'}].map(r=>{
    const pct=r.max>0?r.val/r.max:0,circ=2*Math.PI*16,dash=circ*pct;
    return `<div class="ring-card"><svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4"/><circle cx="22" cy="22" r="16" fill="none" stroke="${r.color}" stroke-width="4" stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round" transform="rotate(-90 22 22)"/><text x="22" y="26" text-anchor="middle" fill="${r.color}" font-family="monospace" font-size="9" font-weight="500">${r.val}</text></svg><div class="ring-label">${r.label}</div><div class="ring-val">${Math.round(pct*100)}%</div></div>`;
  }).join('');
}

function buildWeekStrip(){
  const dow=currentDate.getDay(),ws=new Date(currentDate); ws.setDate(currentDate.getDate()-dow);
  const dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],today=new Date();
  let h='<div class="week-strip">';
  for(let i=0;i<7;i++){
    const d=new Date(ws); d.setDate(ws.getDate()+i);
    const isT=d.toDateString()===today.toDateString(),isSel=d.toDateString()===currentDate.toDateString();
    const wo=isWD(d)&&inPlan(d),hl=state[gk(d)]?.completed;
    let cls='ws-cell'; if(isT)cls+=' today'; if(isSel)cls+=' selected'; cls+=wo?' workout-day':' rest-day'; if(hl)cls+=' has-log';
    h+=`<div class="${cls}" onclick="selDay(${d.getFullYear()},${d.getMonth()},${d.getDate()})"><div class="ws-day">${dn[i]}</div><div class="ws-num">${d.getDate()}</div><div class="ws-type">${wo?'Workout':'Rest'}</div><div class="ws-dot"></div></div>`;
  }
  return h+'</div>';
}

function renderContent(){
  const content=document.getElementById('main-content');
  const wo=isWD(currentDate),ip=inPlan(currentDate);
  const ds=gds(currentDate),tg=calcTarget(currentDate),phase=getPhase(currentDate);
  const wn=getWkNum(currentDate);
  let html=buildWeekStrip();

  html+=`<div class="day-header">
    <div class="day-overline">${ip?`Week ${Math.max(1,Math.min(wn,26))} · Day ${Math.max(1,dbet(START_DATE,currentDate)+1)}`:'Outside Plan'}</div>
    <div class="day-title">${fmtDate(currentDate)}</div>
    <span class="day-badge ${wo?'badge-workout':'badge-rest'}">${wo?'● Training Day':'● Rest Day'}</span>
    ${ip?`<div class="phase-tip">${phase.tip}</div>`:''}
  </div>`;

  if(!ip){ html+=`<div class="rest-card" style="text-align:center"><div style="font-size:32px;margin-bottom:8px">📅</div><div class="rest-ttl">Outside Plan</div><div class="rest-body">This date is outside your 6-month plan (March 16 – September 14, 2026).</div></div>`; content.innerHTML=html; return; }

  // Macro card
  const lg=calcLogged(currentDate);
  html+=`<div class="card"><div class="card-hd"><div class="card-hd-left"><span class="card-ico">📊</span><span class="card-ttl">Daily Targets</span></div><div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)">${wo?'Training':'Rest'} day</div></div><div class="card-bd">
    <div class="macro-chips">
      <div class="mc cal"><div class="mc-val">${tg.cal}</div><div class="mc-lbl">kcal</div></div>
      <div class="mc pro"><div class="mc-val">${tg.p}g</div><div class="mc-lbl">protein</div></div>
      <div class="mc carb"><div class="mc-val">${tg.c}g</div><div class="mc-lbl">carbs</div></div>
      <div class="mc fat"><div class="mc-val">${tg.f}g</div><div class="mc-lbl">fat</div></div>
    </div>
    ${[{lbl:'Protein',cur:lg.p,tgt:tg.p,col:'#60a5fa'},{lbl:'Carbs',cur:lg.c,tgt:tg.c,col:'#fbbf24'},{lbl:'Fat',cur:lg.f,tgt:tg.f,col:'#4ade80'},{lbl:'Calories',cur:lg.cal,tgt:tg.cal,col:'#f472b6'}].map(it=>{
      const pct=Math.min(100,Math.round(it.cur/it.tgt*100));
      return `<div class="mp-row"><div class="mp-lbl">${it.lbl}</div><div class="mp-bar-wrap"><div class="mp-bar" style="width:${pct}%;background:${it.col}"></div></div><div class="mp-nums"><span>${it.cur}</span>/${it.tgt}g</div></div>`;
    }).join('')}
  </div></div>`;

  // Tabs
  const tabs=wo
    ?[{id:'workout',lbl:'🏋️ Workout'},{id:'meals',lbl:'🍽️ Meals'},{id:'notes',lbl:'📝 Notes'}]
    :[{id:'meals',lbl:'🍽️ Meals'},{id:'notes',lbl:'📝 Notes'}];
  const defaultTab=wo?'workout':'meals';
  const curTab=tabs.find(t=>t.id===activeTab)?activeTab:defaultTab;

  html+=`<div class="tab-bar">${tabs.map(t=>`<button class="tab-btn${curTab===t.id?' active':''}" onclick="setTab('${t.id}')">${t.lbl}</button>`).join('')}</div>`;

  if(wo){
    html+=`<div class="tab-panel${curTab==='workout'?' active':''}" id="tp-workout">${buildWorkout(ds)}</div>`;
    html+=`<div class="tab-panel${curTab==='meals'?' active':''}" id="tp-meals">${buildMeals(ds,wo)}</div>`;
    html+=`<div class="tab-panel${curTab==='notes'?' active':''}" id="tp-notes">${buildNotes(ds)}</div>`;
  } else {
    html+=`<div class="tab-panel${curTab==='meals'?' active':''}" id="tp-meals">${buildRestDay()}${buildMeals(ds,wo)}</div>`;
    html+=`<div class="tab-panel${curTab==='notes'?' active':''}" id="tp-notes">${buildNotes(ds)}</div>`;
  }

  content.innerHTML=html;
}

function buildWorkout(ds){
  const w=getW(currentDate),wTime=currentDate.getDay()===6?'8:00 AM – 1:00 PM':'7:00 AM';
  let h=`<div class="card"><div class="card-hd"><div class="card-hd-left"><span class="card-ico">🏋️</span><span class="card-ttl">${w.name}</span></div><div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)">${wTime} · ${w.dur}</div></div><div class="card-bd">
    <div class="warmup-bar"><strong style="color:var(--text2);font-weight:500">Warm-up:</strong> ${w.warmup}</div>`;
  w.exercises.forEach((ex,i)=>{
    const xs=ds.exercises[i]||{},ld=xs.logged;
    h+=`<div class="ex-item${ld?' logged':''}" id="ex-${i}">
      <div class="ex-row"><div class="ex-name">${ex.name}</div><span class="ex-tag">${ex.tag}</span></div>
      <div class="ex-sets">${ex.sets} · Rest ${ex.rest}</div>
      <div class="ex-note">${ex.note}</div>
      <div class="ex-inputs">
        <input class="ex-input" id="ew-${i}" placeholder="Weight (lbs/kg)" value="${xs.weight||''}" oninput="saveEW(${i},this.value)">
        <input class="ex-input" id="er-${i}" placeholder="Actual reps" value="${xs.reps||''}" oninput="saveER(${i},this.value)">
      </div>
      <button class="ex-log-btn" onclick="toggleEx(${i})">${ld?'✓ Done':'Log Set'}</button>
    </div>`;
  });
  if(w.cardio) h+=`<div class="cardio-bar"><div class="cardio-ttl">Cardio Finisher</div><div class="cardio-desc">${w.cardio}</div></div>`;
  h+='</div></div>';
  return h;
}

function buildMeals(ds,wo){
  const meals=wo?MT:MR;
  let h=`<div class="card"><div class="card-hd"><div class="card-hd-left"><span class="card-ico">🍽️</span><span class="card-ttl">${wo?'Training Day Meals':'Rest Day Meals'}</span></div><div style="font-size:12px;color:var(--text3)">Tap when eaten</div></div><div class="card-bd">`;
  meals.forEach((m,i)=>{
    const ld=ds.meals[i];
    h+=`<div class="meal-item${ld?' logged':''}" id="meal-${i}">
      <div class="meal-row"><div class="meal-name">${m.name}</div><div class="meal-time">${m.time}</div></div>
      <div class="meal-pills"><span class="mpill p">${m.macros.p}g P</span><span class="mpill c">${m.macros.c}g C</span><span class="mpill f">${m.macros.f}g F</span><span class="mpill k">${m.macros.cal} kcal</span></div>
      <ul class="food-list">${m.foods.map(f=>`<li>${f}</li>`).join('')}</ul>
      <button class="log-btn" onclick="toggleMeal(${i})">${ld?'✓ Logged':'Mark as eaten'}</button>
    </div>`;
  });
  h+='</div></div>';
  return h;
}

function buildRestDay(){
  const tipIdx=dbet(START_DATE,currentDate)%REST_TIPS.length;
  return `<div class="rest-card"><div class="rest-ttl">Active Recovery Day</div><div class="rest-body">Your muscles are repairing and growing. Eat your macros (lower carb today), sleep well, and move gently.</div><div class="rest-tip"><strong style="font-weight:500;color:var(--text)">Recovery tip:</strong> ${REST_TIPS[tipIdx]}</div></div>`;
}

function buildNotes(ds){
  return `<div class="card"><div class="card-hd"><div class="card-hd-left"><span class="card-ico">📝</span><span class="card-ttl">Notes & Completion</span></div></div><div class="card-bd">
    <textarea class="notes-area" id="day-notes" placeholder="How did you feel? Any PRs? Energy levels? Notes...">${ds.notes||''}</textarea>
    <div style="display:flex;align-items:center;margin-bottom:4px">
      <button class="save-btn" onclick="saveNotes()">Save notes</button>
      <span class="saved-flash" id="saved-flash">Saved ✓</span>
    </div>
    <button class="complete-btn${ds.completed?' done':''}" id="complete-btn" onclick="toggleComplete()">${ds.completed?'✓ Day Completed!':'Mark Day Complete'}</button>
    <div style="font-size:12px;color:var(--text3);margin-top:8px;text-align:center">Marks this day in your streak</div>
  </div></div>`;
}

// ══ ACTIONS ════════════════════════════════════════════════
function selDay(y,m,d){ currentDate=new Date(y,m,d); if(currentDate.getMonth()!==calMonth.getMonth()||currentDate.getFullYear()!==calMonth.getFullYear()) calMonth=new Date(currentDate.getFullYear(),currentDate.getMonth(),1); closeDrawer(); activeTab=isWD(currentDate)?'workout':'meals'; renderAll(); }
function navigateDay(dir){ currentDate.setDate(currentDate.getDate()+dir); if(currentDate.getMonth()!==calMonth.getMonth()) calMonth=new Date(currentDate.getFullYear(),currentDate.getMonth(),1); activeTab=isWD(currentDate)?'workout':'meals'; renderAll(); }
function changeMonth(dir){ calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+dir,1); renderCal(); }
function goToday(){ currentDate=new Date(); calMonth=new Date(currentDate.getFullYear(),currentDate.getMonth(),1); activeTab=isWD(currentDate)?'workout':'meals'; renderAll(); document.getElementById('bnb-today').classList.add('active'); }
function setTab(tab){ activeTab=tab; renderContent(); }
function openDrawer(){ document.getElementById('cal-drawer').classList.add('open'); document.getElementById('drawer-overlay').classList.add('open'); }
function closeDrawer(){ document.getElementById('cal-drawer').classList.remove('open'); document.getElementById('drawer-overlay').classList.remove('open'); }

function toggleMeal(idx){ const ds=gds(currentDate); ds.meals[idx]=!ds.meals[idx]; saveState(); renderAll(); }

function toggleEx(idx){
  const ds=gds(currentDate); if(!ds.exercises[idx]) ds.exercises[idx]={};
  ds.exercises[idx].logged=!ds.exercises[idx].logged; saveState();
  const el=document.getElementById(`ex-${idx}`); if(el){ el.classList.toggle('logged',ds.exercises[idx].logged); const btn=el.querySelector('.ex-log-btn'); if(btn) btn.textContent=ds.exercises[idx].logged?'✓ Done':'Log Set'; }
}

function saveEW(i,v){ const ds=gds(currentDate); if(!ds.exercises[i]) ds.exercises[i]={}; ds.exercises[i].weight=v; saveState(); }
function saveER(i,v){ const ds=gds(currentDate); if(!ds.exercises[i]) ds.exercises[i]={}; ds.exercises[i].reps=v; saveState(); }

function saveNotes(){ const el=document.getElementById('day-notes'); if(!el) return; gds(currentDate).notes=el.value; saveState(); const f=document.getElementById('saved-flash'); if(f){f.style.opacity='1';setTimeout(()=>f.style.opacity='0',1500);} }

function toggleComplete(){ const ds=gds(currentDate); ds.completed=!ds.completed; saveState(); renderAll(); }

// ══ INIT ═══════════════════════════════════════════════════
loadState();
const today=new Date();
currentDate=today<START_DATE?new Date(START_DATE):today;
calMonth=new Date(currentDate.getFullYear(),currentDate.getMonth(),1);
activeTab=isWD(currentDate)?'workout':'meals';
renderAll();
</script>
</body>
</html>
